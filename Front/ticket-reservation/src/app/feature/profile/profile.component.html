@if (resource.isLoading()) {
  <p class="text-neutral-400">Loading profile...</p>
} @else if (resource.error()) {
  <p class="text-red-400 bg-red-500/10 p-4 rounded-xl">Could not load your profile. Please try again later.</p>
} @else if (resource.value(); as user) {
  <div class="profile-page max-w-2xl mx-auto p-6 bg-neutral-800 text-white rounded-xl mt-6 shadow-xl">
    <h1 class="text-2xl font-bold mb-4 text-white">{{ user.firstName }} {{ user.lastName }}</h1>
    
    <dl class="space-y-4">
      <div>
        <dt class="text-neutral-400 text-sm">Email</dt>
        <dd class="text-lg text-white">{{ getEmail() }}</dd>
      </div>
      <div>
        <dt class="text-neutral-400 text-sm">Role</dt>
        <dd class="text-lg text-white">{{ getRole() }}</dd>
      </div>
    </dl>

    <!-- Back Button -->
    <div class="mt-6 pt-4 border-t border-neutral-700 flex justify-end">
      <button 
        type="button" 
        (click)="goBack()" 
        class="px-4 py-2 bg-neutral-700 hover:bg-neutral-600 text-white font-medium rounded-lg transition cursor-pointer"
      >
        Back
      </button>
    </div>
  </div>
}
