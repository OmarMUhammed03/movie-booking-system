<article
  role="link"
  tabindex="0"
  (click)="openDetails()"
  (keyup.enter)="openDetails()"
  class="group relative flex aspect-[2/3] h-full w-full cursor-pointer flex-col overflow-hidden rounded-2xl border border-white/5 bg-neutral-900 shadow-lg transition-transform hover:-translate-y-1 hover:shadow-amber-500/10"
>
  <img
    [src]="posterUrl()"
    [alt]="movie().title"
    class="absolute inset-0 h-full w-full object-cover transition-transform duration-300 group-hover:scale-105"
    draggable="false"
  />
  <div class="pointer-events-none absolute inset-0 bg-gradient-to-t from-black via-black/30 to-transparent"></div>

  <div class="pointer-events-none relative mt-auto p-4">
    <div class="flex items-end justify-between gap-3">
      <div class="min-w-0">
        <h3 class="truncate text-lg font-bold text-white">{{ movie().title }}</h3>
        <p class="text-sm text-neutral-300">{{ movie().genre }}</p>
      </div>

      <div class="flex shrink-0 items-center gap-1 rounded-full bg-black/50 px-2.5 py-1 text-xs text-neutral-200 backdrop-blur-sm">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-3.5 w-3.5">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 6v6l4 2" />
        </svg>
        <span>{{ movie().durationMinutes }}m</span>
      </div>
    </div>

    <span class="mt-3 block w-full rounded-xl bg-amber-400 py-2.5 text-center text-sm font-semibold text-black transition-colors group-hover:bg-amber-300">
      View details
    </span>
  </div>
</article>
