@if (visible) {
  <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3">

    @if (open()) {
      <div class="w-80 sm:w-96 h-[28rem] bg-neutral-900 border border-neutral-700 rounded-2xl shadow-2xl flex flex-col overflow-hidden">

        <div class="flex items-center justify-between px-4 py-3 bg-neutral-800 border-b border-neutral-700">
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-amber-500"></span>
            <h2 class="text-white font-semibold text-sm">CineBot</h2>
            <span class="text-neutral-400 text-xs">AI picks for you</span>
          </div>
          <button (click)="toggle()" aria-label="Close chat"
                  class="text-neutral-400 hover:text-white transition-colors text-xl leading-none">&times;</button>
        </div>

        <div #messagesBox class="flex-1 overflow-y-auto px-3 py-3 space-y-2">
          @for (m of messages(); track $index) {
            <div class="flex" [class.justify-end]="m.from === 'user'">
              <div class="max-w-[85%] px-3 py-2 rounded-2xl text-sm whitespace-pre-wrap"
                   [class]="m.from === 'user'
                     ? 'bg-amber-500 text-black rounded-br-sm'
                     : 'bg-neutral-800 text-neutral-100 rounded-bl-sm'">
                {{ m.text }}
              </div>
            </div>
          }
          @if (thinking()) {
            <div class="flex">
              <div class="bg-neutral-800 text-neutral-400 px-3 py-2 rounded-2xl rounded-bl-sm text-sm flex items-center gap-2">
                <span class="flex gap-1">
                  <span class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-bounce"></span>
                  <span class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-bounce [animation-delay:150ms]"></span>
                  <span class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-bounce [animation-delay:300ms]"></span>
                </span>
                thinking… this can take up to a minute
              </div>
            </div>
          }
        </div>

        @if (isLoggedIn) {
          <form (ngSubmit)="send()" class="p-3 border-t border-neutral-700 flex gap-2">
            <input name="draft" [(ngModel)]="draft" [disabled]="thinking()"
                   placeholder="e.g. something scary for the weekend"
                   autocomplete="off"
                   class="flex-1 bg-neutral-800 text-white text-sm rounded-lg px-3 py-2 placeholder-neutral-500 focus:outline-none focus:ring-1 focus:ring-amber-500 disabled:opacity-50" />
            <button type="submit" [disabled]="thinking() || !draft().trim()"
                    class="bg-amber-500 text-black font-medium px-3 py-2 rounded-lg text-sm disabled:opacity-40 transition-opacity">
              Send
            </button>
          </form>
        } @else {
          <div class="p-3 border-t border-neutral-700 text-center text-neutral-400 text-sm">
            Please log in to chat with CineBot.
          </div>
        }
      </div>
    }

    <button (click)="toggle()" aria-label="Open AI movie assistant"
            class="w-14 h-14 rounded-full bg-amber-500 text-black shadow-lg shadow-amber-500/20 flex items-center justify-center hover:scale-105 transition-transform">
      @if (open()) {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
          <path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/>
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-7 h-7">
          <path fill-rule="evenodd" d="M4.848 2.771A49.144 49.144 0 0 1 12 2.25c2.43 0 4.817.178 7.152.52 1.978.292 3.348 2.024 3.348 3.97v6.02c0 1.946-1.37 3.678-3.348 3.97a48.901 48.901 0 0 1-3.476.383.39.39 0 0 0-.297.17l-2.755 4.133a.75.75 0 0 1-1.248 0l-2.755-4.133a.39.39 0 0 0-.297-.17 48.9 48.9 0 0 1-3.476-.384c-1.978-.29-3.348-2.024-3.348-3.97V6.741c0-1.946 1.37-3.678 3.348-3.97ZM6.75 8.25a.75.75 0 0 1 .75-.75h9a.75.75 0 0 1 0 1.5h-9a.75.75 0 0 1-.75-.75Zm.75 2.25a.75.75 0 0 0 0 1.5H12a.75.75 0 0 0 0-1.5H7.5Z" clip-rule="evenodd"/>
        </svg>
      }
    </button>
  </div>
}
