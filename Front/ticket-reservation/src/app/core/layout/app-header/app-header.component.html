<header class="sticky top-0 z-50 border-b border-white/10 bg-[#09090f]/90 backdrop-blur-md">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4 md:px-10">
    <a routerLink="/movies" class="text-xl font-bold tracking-tight text-white transition-colors hover:text-amber-400">
      Cine<span class="text-amber-400">Book</span>
    </a>

    <nav class="flex items-center gap-2 sm:gap-3">
      @if (isLoggedIn()) {
        <a
          routerLink="/profile"
          routerLinkActive="bg-amber-400/15 text-amber-400"
          class="rounded-lg px-3 py-2 text-sm font-medium text-neutral-300 transition-colors hover:text-white"
        >profile</a>
        
        <a
          routerLink="/reservations"
          routerLinkActive="bg-amber-400/15 text-amber-400"
          class="rounded-lg px-3 py-2 text-sm font-medium text-neutral-300 transition-colors hover:text-white"
        >
          My reservations
        </a>
        <button
          type="button"
          (click)="logout()"
          class="rounded-lg border border-white/10 px-3 py-2 text-sm font-medium text-neutral-300 transition-colors hover:border-white/20 hover:text-white"
        >
          Log out
        </button>
      } @else {
        <a
          routerLink="/login"
          routerLinkActive="bg-amber-400/15 text-amber-400"
          class="rounded-lg px-3 py-2 text-sm font-medium text-neutral-300 transition-colors hover:text-white"
        >
          Log in
        </a>
        <a
          routerLink="/register"
          class="rounded-lg bg-amber-400 px-4 py-2 text-sm font-semibold text-black transition-colors hover:bg-amber-300"
        >
          Register
        </a>
      }
    </nav>
  </div>
</header>
