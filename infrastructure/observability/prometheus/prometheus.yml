global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: movie-booking-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - eureka-server:8761
          - api-gateway:8080
          - auth-service:8080
          - user-service:8090
          - movie-service:8082
          - show-service:8083
          - reservation-service:8085
          - payment-service:8088
          - ai-service:8086
        labels:
          runtime: docker

      # Useful when backend services are run from the IDE while Prometheus runs in Docker.
      - targets:
          - host.docker.internal:8761
          - host.docker.internal:8080
          - host.docker.internal:8090
          - host.docker.internal:8082
          - host.docker.internal:8083
          - host.docker.internal:8085
          - host.docker.internal:8088
          - host.docker.internal:8086
        labels:
          runtime: host

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
